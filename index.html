<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <div class="container">

        <div class="inpData">


            <div class="child1">
                <input type="text" id="inp" placeholder="Enter City Name:">
                <br><br>
            </div>


            <div class="child2">
                <button id="clk">Submit</button>
                <br><br>
            </div>
        </div>


        <div class="data">
            <table>

                <th>
                <td class="insertTheData"></td>
                </th>

                <tr>
                    <td><label for="lon">Longitude:</label></td>
                    <td><input type="text" id="lon" readonly></td>
                </tr>
                <tr>
                    <td><label for="lat">Latitude:</label></td>
                    <td><input type="text" id="lat" readonly></td>
                </tr>
                <tr>
                    <td><label for="weather">Weather:</label></td>
                    <td><input type="text" id="weather" readonly></td>
                </tr>
                <tr>
                    <td><label for="temp">Temperature:</label></td>
                    <td><input type="text" id="temp" readonly></td>
                </tr>
                <tr>
                    <td><label for="humid">Humidity:</label></td>
                    <td><input type="text" id="humid" readonly></td>
                </tr>
            </table>



        </div>

    </div>

</body>

<script src="index.js"></script>

</html>
